services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot123
      POSTGRES_DB: copilot
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  chroma:
    image: chromadb/chroma:latest
    ports: ["8000:8000"]
    volumes: ["chromadata:/chroma/chroma"]

  backend:
    build: ./backend
    ports: ["8080:8080"]
    depends_on: [db, chroma]
    environment:
      DATABASE_URL: postgresql+asyncpg://copilot:copilot123@db:5432/copilot
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      AGENT_URLS: "http://profile-agent:8001,http://matching-agent:8002,http://interview-agent:8003,http://support-agent:8004"
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_API_KEY: "YOUR_LANGSMITH_API_KEY"
      LANGCHAIN_PROJECT: "AI Agent"
    volumes: ["./backend/app:/app/app"]

  profile-agent:
    build: ./backend
    command: uvicorn app.agents.profile.server:app --host 0.0.0.0 --port 8001
    ports: ["8001:8001"]
    depends_on: [db, chroma]
    environment:
      DATABASE_URL: postgresql+asyncpg://copilot:copilot123@db:5432/copilot
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_API_KEY: "YOUR_LANGSMITH_API_KEY"
      LANGCHAIN_PROJECT: "AI Agent"
    volumes: ["./backend/app:/app/app"]

  matching-agent:
    build: ./backend
    command: uvicorn app.agents.matching.server:app --host 0.0.0.0 --port 8002
    ports: ["8002:8002"]
    depends_on: [db, chroma]
    environment:
      DATABASE_URL: postgresql+asyncpg://copilot:copilot123@db:5432/copilot
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_API_KEY: "YOUR_LANGSMITH_API_KEY"
      LANGCHAIN_PROJECT: "AI Agent"
    volumes: ["./backend/app:/app/app"]

  interview-agent:
    build: ./backend
    command: uvicorn app.agents.interview.server:app --host 0.0.0.0 --port 8003
    ports: ["8003:8003"]
    depends_on: [db, chroma]
    environment:
      DATABASE_URL: postgresql+asyncpg://copilot:copilot123@db:5432/copilot
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_API_KEY: "YOUR_LANGSMITH_API_KEY"
      LANGCHAIN_PROJECT: "AI Agent"
    volumes: ["./backend/app:/app/app"]

  support-agent:
    build: ./backend
    command: uvicorn app.agents.support.server:app --host 0.0.0.0 --port 8004
    ports: ["8004:8004"]
    depends_on: [db, chroma]
    environment:
      DATABASE_URL: postgresql+asyncpg://copilot:copilot123@db:5432/copilot
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_API_KEY: "YOUR_LANGSMITH_API_KEY"
      LANGCHAIN_PROJECT: "AI Agent"
    volumes: ["./backend/app:/app/app"]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]
    volumes: ["./frontend/src:/app/src"]

volumes:
  pgdata:
  chromadata:
